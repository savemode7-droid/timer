<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>作業タイマー</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="title-row">
      <h1>作業タイマー</h1>
      <span class="app-version">v38</span>
    </div>
    <div class="sub">開始・終了時刻はパネル内で手入力修正できます。修正内容は一覧とCSVにも反映されます。</div>
  </header>

  <main>
    <section class="card">
      <h2 class="section-title">記録日</h2>
      <div class="date-row">
        <input id="dateFilter" type="date" />
        <button class="secondary" id="todayBtn">今日</button>
      </div>
    </section>

    <section class="card action-panel">
      <div class="top-actions">
        <button class="secondary add-work-panel-btn" id="addPanelBtn">＋ 作業パネルの追加</button>
        <button class="secondary item-manage-btn" id="openItemDialogBtn">📋 項目管理</button>
      </div>
    </section>

    <section class="card">
      <div class="panel-list" id="panelList"></div>
    </section>

    <section class="card section-card-blue">
      <h2 class="section-title">記録</h2>
      <div id="logs"></div>
    </section>

    <section class="card section-card-blue">
      <h2 class="section-title">合計</h2>
      <div id="summary"></div>
    </section>

    <section class="card section-card-blue">
      <h2 class="section-title">出力</h2>
      <div class="export-panel">
        <div class="export-select-row">
          <select id="monthFilter"></select>
          <select id="exportFormat">
            <option value="csv">CSV</option>
            <option value="excel">Excel</option>
          </select>
        </div>
        <div class="export-button-row">
          <button class="export-main" id="monthCsvBtn">出力</button>
        </div>
        <div class="delete-row">
          <button class="delete-subtle" id="clearMonthBtn">選択月削除</button>
        </div>
      </div>
    </section>
  </main>

  <dialog id="itemDialog">
    <div class="dialog-body">
      <div class="dialog-title">プルダウン項目管理</div>
      <div class="stack">
        <input id="newItemName" placeholder="項目名 例：メルマガ運営" />
        <input id="newItemKana" placeholder="ふりがな 例：めるまがうんえい" />
        <div class="row">
          <button id="addItemBtn">項目を追加</button>
          <button class="ghost" id="closeDialogBtn">閉じる</button>
        </div>
      </div>
      <div id="itemManageList"></div>
    </div>
  </dialog>

  <script src="app.js"></script>
</html>
