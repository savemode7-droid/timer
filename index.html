<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>作業タイマー</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --text: #17202a;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger: #dc2626;
      --green: #16a34a;
      --shadow: 0 8px 24px rgba(0,0,0,.08);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: env(safe-area-inset-top) 14px env(safe-area-inset-bottom);
    }
    header, main { max-width: 760px; margin: 0 auto; }
    header { padding: 18px 4px 8px; }
    h1 { margin: 0; font-size: 28px; letter-spacing: .02em; }
    .sub { color: var(--muted); font-size: 14px; margin-top: 4px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      margin: 12px 0;
    }
    .row { display: flex; gap: 10px; align-items: center; }
    .stack { display: grid; gap: 10px; }
    input, select {
      width: 100%;
      font-size: 16px;
      padding: 13px 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
    }
    input[type="time"] { font-variant-numeric: tabular-nums; }
    button {
      border: 0;
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 16px;
      font-weight: 700;
      background: var(--primary);
      color: white;
      cursor: pointer;
      touch-action: manipulation;
      white-space: nowrap;
    }
    button:disabled { opacity: .45; cursor: not-allowed; }
    button:active { transform: scale(.99); }
    button.secondary { background: #eef2ff; color: var(--primary-dark); }
    button.danger { background: #fee2e2; color: var(--danger); }
    button.green { background: var(--green); color: white; }
    button.ghost { background: #f3f4f6; color: #374151; }
    button.plus {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      font-size: 26px;
      line-height: 1;
      padding: 0;
    }
    .panel-list { display: grid; gap: 12px; }
    .timer-panel {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      background: #fff;
    }
    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .panel-title { font-weight: 900; font-size: 18px; }
    .elapsed {
      font-size: 34px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      text-align: center;
      margin: 16px 0;
    }
    .time-edit {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 10px 0;
    }
    .time-box {
      background: #f9fafb;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
    }
    .time-box label {
      display: block;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .small { font-size: 13px; color: var(--muted); }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .section-title { font-size: 18px; margin: 0 0 10px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 9px 4px;
      text-align: left;
      vertical-align: top;
    }
    th { color: var(--muted); font-weight: 700; }
    .right { text-align: right; }
    .empty { color: var(--muted); text-align: center; padding: 18px 4px; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .inline-add {
      margin-top: 10px;
      padding: 12px;
      border: 1px dashed var(--line);
      border-radius: 16px;
      background: #fafafa;
    }
    .item-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      display: grid;
      gap: 8px;
      margin-top: 10px;
      background: #fff;
    }
    .item-name { font-weight: 800; }
    .item-kana { color: var(--muted); font-size: 13px; }
    dialog {
      border: 0;
      border-radius: 20px;
      padding: 0;
      width: min(94vw, 560px);
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
    }
    dialog::backdrop { background: rgba(0,0,0,.35); }
    .dialog-body { padding: 16px; }
    .dialog-title { font-size: 20px; font-weight: 900; margin-bottom: 12px; }
    @media (max-width: 420px) {
      h1 { font-size: 24px; }
      .row { align-items: stretch; }
      .elapsed { font-size: 32px; }
      .time-edit { grid-template-columns: 1fr; }
      table { font-size: 13px; }
      .actions button { flex: 1; }
    }

  
    /* compact colored v2 */
    body {
      background: #eef2f7;
      padding: env(safe-area-inset-top) 8px env(safe-area-inset-bottom);
    }
    header {
      padding: 8px 2px 4px;
    }
    h1 {
      font-size: 20px;
    }
    .sub {
      display: none;
    }
    .card {
      padding: 8px;
      margin: 8px 0;
      border-radius: 12px;
      box-shadow: 0 3px 10px rgba(0,0,0,.06);
    }
    .timer-panel {
      padding: 8px;
      border-radius: 12px;
      border: 2px solid #c7d2fe;
      background: #f8fafc;
    }
    .panel-head {
      background: #1e40af;
      color: #fff;
      margin: -8px -8px 8px;
      padding: 7px 9px;
      border-radius: 10px 10px 0 0;
    }
    .panel-title {
      font-size: 14px;
      color: #fff;
    }
    .panel-head .small {
      color: #dbeafe;
    }
    .small {
      font-size: 11px;
    }
    select, input {
      font-size: 14px;
      padding: 8px 9px;
      border-radius: 9px;
      border: 1px solid #cbd5e1;
    }
    .main-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    .main-actions button {
      font-size: 15px;
      padding: 11px 8px;
    }
    button.start-btn {
      background: #2563eb;
      color: #fff;
    }
    button.end-btn {
      background: #16a34a;
      color: #fff;
    }
    .time-edit {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin: 8px 0 0;
    }
    .time-box {
      background: #fff;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 6px;
    }
    .time-box label {
      font-size: 11px;
      color: #334155;
      margin-bottom: 3px;
    }
    .time-box input {
      padding: 7px 6px;
      font-size: 13px;
      border-color: #e2e8f0;
    }
    .elapsed {
      font-size: 22px;
      margin: 7px 0 0;
      color: #1e3a8a;
    }
    details.inline-add {
      margin-top: 8px;
      padding: 0;
      border: 0;
      background: transparent;
    }
    details.inline-add summary {
      list-style: none;
      cursor: pointer;
      display: inline-block;
      background: #e0f2fe;
      color: #0369a1;
      padding: 7px 10px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 700;
    }
    details.inline-add summary::-webkit-details-marker {
      display: none;
    }
    .inline-add-body {
      margin-top: 6px;
      padding: 8px;
      border-radius: 10px;
      background: #fff;
      border: 1px dashed #93c5fd;
    }
    button.plus {
      width: 38px;
      height: 38px;
      font-size: 22px;
      background: #1e40af;
    }
    button.secondary {
      background: #dbeafe;
      color: #1e40af;
    }
    button.danger {
      background: #fee2e2;
      color: #b91c1c;
    }
    .toolbar {
      gap: 6px;
      margin-top: 7px;
    }
    .section-title {
      font-size: 15px;
      margin-bottom: 6px;
      color: #1e40af;
    }
    table {
      font-size: 12px;
    }
    th {
      color: #1e40af;
      background: #eff6ff;
    }
    th, td {
      padding: 6px 3px;
    }
    .empty {
      padding: 10px 3px;
      font-size: 12px;
      color: #64748b;
    }
    .item-card {
      padding: 8px;
      gap: 5px;
      margin-top: 7px;
      border-radius: 10px;
    }
    .dialog-title {
      font-size: 16px;
    }
    @media (max-width: 420px) {
      .actions button {
        flex: initial;
      }
      table {
        font-size: 11px;
      }
    }

  </style>
</head>
<body>
  <header>
    <h1>作業タイマー</h1>
    <div class="sub">開始・終了時刻はパネル内で手入力修正できます。修正内容は一覧とCSVにも反映されます。</div>
  </header>

  <main>
    <section class="card">
      <div class="panel-list" id="panelList"></div>
      <div class="toolbar">
        <button class="plus" id="addPanelBtn" title="パネル追加">＋</button>
        <button class="secondary" id="openItemDialogBtn">プルダウン項目管理</button>
      </div>
    </section>

    <section class="card">
      <h2 class="section-title">今日の合計</h2>
      <div id="summary"></div>
    </section>

    <section class="card">
      <h2 class="section-title">記録</h2>
      <div class="row">
        <input id="dateFilter" type="date" />
        <button class="secondary" id="todayBtn">今日</button>
      </div>
      <div class="toolbar">
        <button class="ghost" id="csvBtn">CSV出力</button>
        <button class="danger" id="clearLogsBtn">表示日の記録を削除</button>
      </div>
      <div id="logs"></div>
    </section>
  </main>

  <dialog id="itemDialog">
    <div class="dialog-body">
      <div class="dialog-title">プルダウン項目管理</div>
      <div class="stack">
        <input id="newItemName" placeholder="項目名 例：メルマガ運営" />
        <input id="newItemKana" placeholder="ふりがな 例：めるまがうんえい" />
        <div class="row">
          <button id="addItemBtn">項目を追加</button>
          <button class="ghost" id="closeDialogBtn">閉じる</button>
        </div>
      </div>
      <div id="itemManageList"></div>
    </div>
  </dialog>

  <script>
    const STORAGE_KEY = "work_timer_panel_app_v4";
    const OLD_KEYS = ["work_timer_panel_app_v3", "work_timer_panel_app_v2", "work_timer_app_v1"];
    const $ = (id) => document.getElementById(id);

    let state = loadState();

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        try { return normalizeState(JSON.parse(raw)); } catch {}
      }

      for (const key of OLD_KEYS) {
        const old = localStorage.getItem(key);
        if (!old) continue;
        try {
          const oldState = JSON.parse(old);
          return normalizeState({
            items: oldState.items || [],
            panels: oldState.panels || [{ id: crypto.randomUUID(), itemId: null, runningSince: null }],
            logs: oldState.logs || []
          });
        } catch {}
      }

      return {
        items: [],
        panels: [{ id: crypto.randomUUID(), itemId: null, runningSince: null, activeLogId: null, lastLogId: null }],
        logs: []
      };
    }

    function normalizeState(s) {
      const items = Array.isArray(s.items) ? s.items.filter(i => i && i.name).map(i => ({
        id: i.id || crypto.randomUUID(),
        name: i.name,
        kana: i.kana || i.name
      })) : [];

      const logs = Array.isArray(s.logs) ? s.logs.map(l => {
        const start = l.start || new Date().toISOString();
        const end = l.end || start;
        return {
          id: l.id || crypto.randomUUID(),
          itemId: l.itemId || null,
          itemName: l.itemName || "",
          start,
          end,
          date: l.date || dateKey(new Date(start)),
          durationMs: Math.max(0, new Date(end).getTime() - new Date(start).getTime())
        };
      }) : [];

      let panels = Array.isArray(s.panels) && s.panels.length
        ? s.panels.map(p => ({
            id: p.id || crypto.randomUUID(),
            itemId: p.itemId || null,
            runningSince: p.runningSince || null,
            activeLogId: p.activeLogId || null,
            lastLogId: p.lastLogId || null
          }))
        : [{ id: crypto.randomUUID(), itemId: null, runningSince: null, activeLogId: null, lastLogId: null }];

      return { items, panels, logs };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function sortedItems() {
      return [...state.items].sort((a, b) =>
        (a.kana || a.name).localeCompare((b.kana || b.name), "ja")
      );
    }

    function pad(n) { return String(n).padStart(2, "0"); }

    function dateKey(d = new Date()) {
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    }

    function timeText(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function dateTimeLocalValue(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function localInputToIso(value) {
      if (!value) return null;
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return null;
      return d.toISOString();
    }

    function durationText(ms) {
      const totalSec = Math.max(0, Math.floor(ms / 1000));
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;
      if (h > 0) return `${h}:${pad(m)}:${pad(s)}`;
      return `${m}:${pad(s)}`;
    }

    function durationJa(ms) {
      const totalMin = Math.round(ms / 60000);
      const h = Math.floor(totalMin / 60);
      const m = totalMin % 60;
      if (h && m) return `${h}時間${m}分`;
      if (h) return `${h}時間`;
      return `${m}分`;
    }

    function escapeHtml(s) {
      return String(s ?? "").replace(/[&<>"']/g, c => ({
        "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#039;"
      }[c]));
    }

    function itemById(id) {
      return state.items.find(i => i.id === id);
    }

    function logById(id) {
      return state.logs.find(l => l.id === id);
    }

    function getPanelLog(panel) {
      return logById(panel.activeLogId) || logById(panel.lastLogId);
    }

    function recalcLog(log) {
      const startMs = new Date(log.start).getTime();
      const endMs = new Date(log.end).getTime();
      log.durationMs = Math.max(0, endMs - startMs);
      log.date = dateKey(new Date(log.start));
    }

    function renderPanels() {
      const list = $("panelList");
      if (!state.panels.length) addPanel(false);

      const options = `<option value="">項目を選択</option>` + sortedItems().map(item =>
        `<option value="${item.id}">${escapeHtml(item.name)}</option>`
      ).join("");

      list.innerHTML = state.panels.map((panel, index) => {
        const item = itemById(panel.itemId);
        const running = !!panel.runningSince;
        const panelLog = getPanelLog(panel);
        const elapsed = running && panelLog
          ? Date.now() - new Date(panelLog.start).getTime()
          : panelLog
            ? panelLog.durationMs
            : 0;

        return `
          <div class="timer-panel">
            <div class="panel-head">
              <div>
                <div class="panel-title">パネル ${index + 1}</div>
                <div class="small">${running ? "計測中: " + timeText(panelLog?.start || panel.runningSince) + "開始" : "停止中"}</div>
              </div>
              ${state.panels.length > 1 ? `<button class="danger" data-delete-panel="${panel.id}">削除</button>` : ""}
            </div>

            <select data-select-panel="${panel.id}" ${running ? "disabled" : ""}>
              ${options}
            </select>

            <div class="main-actions">
              <button class="start-btn" data-start="${panel.id}" ${running || !item ? "disabled" : ""}>開始</button>
              <button class="end-btn" data-stop="${panel.id}" ${!running ? "disabled" : ""}>終了</button>
            </div>

            <div class="elapsed" data-elapsed="${panel.id}">${durationText(elapsed)}</div>

            <details class="inline-add">
              <summary>＋ 項目を追加</summary>
              <div class="inline-add-body">
                <div class="stack">
                  <input data-direct-name="${panel.id}" placeholder="項目名" ${running ? "disabled" : ""} />
                  <input data-direct-kana="${panel.id}" placeholder="ふりがな" ${running ? "disabled" : ""} />
                  <button class="secondary" data-direct-add="${panel.id}" ${running ? "disabled" : ""}>追加して選択</button>
                </div>
              </div>
            </details>

            <div class="time-edit">
              <div class="time-box">
                <label>開始時間</label>
                <input type="datetime-local" data-start-time="${panel.id}" value="${dateTimeLocalValue(panelLog?.start)}" ${!panelLog ? "disabled" : ""} />
              </div>
              <div class="time-box">
                <label>終了時間</label>
                <input type="datetime-local" data-end-time="${panel.id}" value="${dateTimeLocalValue(panelLog?.end)}" ${!panelLog ? "disabled" : ""} />
              </div>
            </div>

          </div>
        `;
      }).join("");

      state.panels.forEach(panel => {
        const select = document.querySelector(`[data-select-panel="${panel.id}"]`);
        if (select) select.value = panel.itemId || "";
      });
    }

    function renderItemManageList() {
      const area = $("itemManageList");
      const items = sortedItems();

      if (!items.length) {
        area.innerHTML = `<div class="empty">項目はまだありません。</div>`;
        return;
      }

      area.innerHTML = items.map(item => `
        <div class="item-card">
          <div>
            <div class="item-name">${escapeHtml(item.name)}</div>
            <div class="item-kana">${escapeHtml(item.kana)}</div>
          </div>
          <div class="actions">
            <button class="ghost" data-edit-item="${item.id}">編集</button>
            <button class="danger" data-delete-item="${item.id}">削除</button>
          </div>
        </div>
      `).join("");
    }

    function renderSummary() {
      const today = dateKey();
      const sums = {};
      state.logs.filter(l => l.date === today).forEach(l => {
        sums[l.itemName] = (sums[l.itemName] || 0) + l.durationMs;
      });

      const entries = Object.entries(sums).sort((a,b) => b[1] - a[1]);
      $("summary").innerHTML = entries.length
        ? `<table><thead><tr><th>項目</th><th class="right">合計</th></tr></thead><tbody>` +
          entries.map(([name, ms]) => `<tr><td>${escapeHtml(name)}</td><td class="right">${durationJa(ms)}</td></tr>`).join("") +
          `</tbody></table>`
        : `<div class="empty">今日の記録はまだありません。</div>`;
    }

    function renderLogs() {
      const targetDate = $("dateFilter").value || dateKey();
      const logs = state.logs.filter(l => l.date === targetDate).sort((a,b) => new Date(b.start) - new Date(a.start));

      $("logs").innerHTML = logs.length
        ? `<table><thead><tr><th>項目</th><th>時間</th><th class="right">作業時間</th></tr></thead><tbody>` +
          logs.map(l => `
            <tr>
              <td>${escapeHtml(l.itemName)}</td>
              <td>${timeText(l.start)}-${timeText(l.end)}</td>
              <td class="right">${durationJa(l.durationMs)}</td>
            </tr>`).join("") +
          `</tbody></table>`
        : `<div class="empty">この日の記録はありません。</div>`;
    }

    function renderAll() {
      renderPanels();
      renderItemManageList();
      renderSummary();
      renderLogs();
    }

    function addPanel(shouldRender = true) {
      state.panels.push({ id: crypto.randomUUID(), itemId: null, runningSince: null, activeLogId: null, lastLogId: null });
      saveState();
      if (shouldRender) renderAll();
    }

    function deletePanel(id) {
      const panel = state.panels.find(p => p.id === id);
      if (!panel) return;
      if (panel.runningSince && !confirm("計測中です。削除しますか？記録は残りますが、終了はされません。")) return;
      state.panels = state.panels.filter(p => p.id !== id);
      saveState();
      renderAll();
    }

    function changePanelItem(panelId, itemId) {
      const panel = state.panels.find(p => p.id === panelId);
      if (!panel || panel.runningSince) return;
      panel.itemId = itemId || null;
      panel.lastLogId = null;
      panel.activeLogId = null;
      saveState();
      renderAll();
    }

    function startPanel(id) {
      const panel = state.panels.find(p => p.id === id);
      if (!panel || !panel.itemId) return;

      const item = itemById(panel.itemId);
      if (!item) return;

      const now = new Date().toISOString();
      const log = {
        id: crypto.randomUUID(),
        itemId: item.id,
        itemName: item.name,
        start: now,
        end: now,
        date: dateKey(new Date(now)),
        durationMs: 0
      };

      state.logs.push(log);
      panel.runningSince = now;
      panel.activeLogId = log.id;
      panel.lastLogId = log.id;

      saveState();
      renderAll();
    }

    function stopPanel(id) {
      const panel = state.panels.find(p => p.id === id);
      if (!panel || !panel.runningSince) return;

      const log = logById(panel.activeLogId);
      if (!log) {
        panel.runningSince = null;
        panel.activeLogId = null;
        saveState();
        renderAll();
        return;
      }

      log.end = new Date().toISOString();
      recalcLog(log);

      panel.runningSince = null;
      panel.activeLogId = null;
      panel.lastLogId = log.id;

      saveState();
      renderAll();
    }

    function updatePanelTime(panelId, field, value) {
      const panel = state.panels.find(p => p.id === panelId);
      if (!panel) return;

      const log = getPanelLog(panel);
      if (!log) return;

      const iso = localInputToIso(value);
      if (!iso) return;

      if (field === "start") {
        log.start = iso;
        if (panel.runningSince) panel.runningSince = iso;
      } else {
        log.end = iso;
      }

      recalcLog(log);
      saveState();
      renderAll();
    }

    function createItem(name, kana) {
      const item = { id: crypto.randomUUID(), name: name.trim(), kana: kana.trim() };
      state.items.push(item);
      return item;
    }

    function addItemFromDialog() {
      const name = $("newItemName").value.trim();
      const kana = $("newItemKana").value.trim();
      if (!name || !kana) {
        alert("項目名とふりがなを両方入力してください。");
        return;
      }
      createItem(name, kana);
      $("newItemName").value = "";
      $("newItemKana").value = "";
      saveState();
      renderAll();
    }

    function addItemFromPanel(panelId) {
      const nameInput = document.querySelector(`[data-direct-name="${panelId}"]`);
      const kanaInput = document.querySelector(`[data-direct-kana="${panelId}"]`);
      const name = nameInput?.value.trim();
      const kana = kanaInput?.value.trim();

      if (!name || !kana) {
        alert("項目名とふりがなを両方入力してください。");
        return;
      }

      const item = createItem(name, kana);
      const panel = state.panels.find(p => p.id === panelId);
      if (panel) panel.itemId = item.id;
      saveState();
      renderAll();
    }

    function editItem(id) {
      const item = itemById(id);
      if (!item) return;

      const name = prompt("項目名", item.name);
      if (!name || !name.trim()) return;

      const kana = prompt("ふりがな", item.kana || item.name);
      if (!kana || !kana.trim()) return;

      const oldName = item.name;
      item.name = name.trim();
      item.kana = kana.trim();

      if (confirm("過去の記録にも新しい項目名を反映しますか？")) {
        state.logs.forEach(l => {
          if (l.itemId === item.id || l.itemName === oldName) l.itemName = item.name;
        });
      }

      saveState();
      renderAll();
    }

    function deleteItem(id) {
      const item = itemById(id);
      if (!item) return;

      const isRunning = state.panels.some(p => p.itemId === id && p.runningSince);
      if (isRunning) {
        alert("計測中の項目は削除できません。先に終了してください。");
        return;
      }

      if (!confirm(`「${item.name}」をプルダウンから削除しますか？過去の記録は残ります。`)) return;

      state.items = state.items.filter(i => i.id !== id);
      state.panels.forEach(p => {
        if (p.itemId === id) {
          p.itemId = null;
          p.activeLogId = null;
          p.lastLogId = null;
        }
      });

      saveState();
      renderAll();
    }

    function exportCsv() {
      const rows = [["日付","項目","開始","終了","分"]];
      state.logs.forEach(l => {
        rows.push([
          l.date,
          l.itemName,
          timeText(l.start),
          timeText(l.end),
          Math.round(l.durationMs / 60000)
        ]);
      });
      const csv = rows.map(row => row.map(v => `"${String(v).replaceAll('"','""')}"`).join(",")).join("\n");
      const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `作業タイマー記録_${dateKey()}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function clearVisibleLogs() {
      const targetDate = $("dateFilter").value || dateKey();
      if (!confirm(`${targetDate} の記録を削除しますか？`)) return;

      const removeIds = new Set(state.logs.filter(l => l.date === targetDate).map(l => l.id));
      state.logs = state.logs.filter(l => l.date !== targetDate);

      state.panels.forEach(p => {
        if (removeIds.has(p.activeLogId)) {
          p.activeLogId = null;
          p.runningSince = null;
        }
        if (removeIds.has(p.lastLogId)) p.lastLogId = null;
      });

      saveState();
      renderAll();
    }

    $("addPanelBtn").addEventListener("click", () => addPanel(true));
    $("openItemDialogBtn").addEventListener("click", () => {
      renderItemManageList();
      $("itemDialog").showModal();
    });
    $("closeDialogBtn").addEventListener("click", () => $("itemDialog").close());
    $("addItemBtn").addEventListener("click", addItemFromDialog);
    $("newItemKana").addEventListener("keydown", e => { if (e.key === "Enter") addItemFromDialog(); });

    $("todayBtn").addEventListener("click", () => {
      $("dateFilter").value = dateKey();
      renderLogs();
    });
    $("dateFilter").addEventListener("change", renderLogs);
    $("csvBtn").addEventListener("click", exportCsv);
    $("clearLogsBtn").addEventListener("click", clearVisibleLogs);

    document.body.addEventListener("change", e => {
      const el = e.target;
      if (el.dataset.selectPanel) changePanelItem(el.dataset.selectPanel, el.value);
      if (el.dataset.startTime) updatePanelTime(el.dataset.startTime, "start", el.value);
      if (el.dataset.endTime) updatePanelTime(el.dataset.endTime, "end", el.value);
    });

    document.body.addEventListener("click", e => {
      const el = e.target;
      if (el.dataset.start) startPanel(el.dataset.start);
      if (el.dataset.stop) stopPanel(el.dataset.stop);
      if (el.dataset.deletePanel) deletePanel(el.dataset.deletePanel);
      if (el.dataset.directAdd) addItemFromPanel(el.dataset.directAdd);
      if (el.dataset.editItem) editItem(el.dataset.editItem);
      if (el.dataset.deleteItem) deleteItem(el.dataset.deleteItem);
    });

    $("dateFilter").value = dateKey();
    saveState();
    renderAll();

    setInterval(() => {
      state.panels.forEach(panel => {
        if (!panel.runningSince) return;
        const log = getPanelLog(panel);
        const node = document.querySelector(`[data-elapsed="${panel.id}"]`);
        if (node && log) node.textContent = durationText(Date.now() - new Date(log.start).getTime());
      });
    }, 1000);
  </script>
</body>
</html>
